run:
  name: prism_ssl_cross_series_4view
  seed: 42

wandb:
  mode: online
  project: nvreason-prism-ssl
  entity: ""
  tags: ["cross-series", "study4", "single-gpu", "betty"]

model:
  name: vit_l
  d_model: 1152
  num_layers: 24
  num_heads: 16
  mlp_ratio: 4.0
  dropout: 0.1
  proj_dim: 256
  pos_min_wavelength_mm: 4.0
  pos_max_wavelength_mm: 64.0
  mim_mask_ratio: 0.25
  mim_decoder_layers: 2

data:
  catalog_path: data/pmbb_catalog.csv.gz
  sample_unit: study4
  n_scans: 0
  modality_filter: [CT, MR]
  n_patches: 256
  patch_mm: 20.0
  storage_mode: sharded
  workers: 8
  warm_pool_size: 8
  visits_per_scan: 500
  max_prefetch_replacements: 2
  use_totalseg_body_centers: true
  pair_local_curriculum_steps: 200000
  pair_local_final_prob: 0.35
  pair_local_start_radius_mm: 192.0
  pair_local_end_radius_mm: 64.0
  strict_background_errors: false
  use_local_scratch: true
  broken_abort_ratio: 0.10
  broken_abort_min_attempts: 200
  max_broken_series_log: 2000

train:
  batch_size: 32
  max_steps: 2000000
  log_every: 25
  precision: bf16
  lr: 1.0e-4
  weight_decay: 1.0e-2
  seed: 42
  device: auto
  allow_failures: false

loss:
  w_distance: 1.0
  w_mim: 1.0
  w_mim_register_target: 0.5
  w_mim_cross_target: 0.5
  w_supcon_target: 0.2
  supcon_temperature: 0.1
  supcon_warmup_steps: 2000
  supcon_ramp_steps: 3000
  mim_aux_warmup_steps: 2000
  mim_aux_ramp_steps: 3000

checkpoint:
  local_ckpt_every_hours: 12.0
  artifact_every_hours: 12.0
  artifact_every_steps: 0
  max_local_checkpoints: 1
  local_ckpt_dir: ~/prism_ssl/checkpoints/<run_id>
  no_resume: false

quota:
  home_soft_limit_gb: 25.0
  home_hard_limit_gb: 42.0

runtime:
  tmp_run_dir: ""
  summary_output: ""
