# 36-run clean pair2 ablation definition
# Cartesian product of factors below.

base:
  inherits: baseline.yaml
  train:
    max_steps: 30000

factors:
  w_supcon_instance_target: [0.05, 0.1, 0.2]
  w_supcon_protocol_target: [0.05, 0.1, 0.2]
  w_patch_size: [0.1, 0.25]
  source_patch_mm_max: [48, 64]

fixed:
  data:
    n_patches: 1024
    workers: 8
    visits_per_scan: 100
    use_local_scratch: true
    source_patch_mm_min: 16.0

ranking:
  primary_metric: proxy_quality_score
  tie_breakers:
    - throughput_effective_patches_per_sec
    - -stall_steps_ge_2000ms
